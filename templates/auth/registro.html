{% extends 'base.html' %}
{% block title %}Registro — TU CAFE{% endblock %}
{% block body_class %}dark-page{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-container" style="max-width:520px;grid-template-columns:1fr">
    <div class="login-left">
      <div class="login-brand">TU <span>CAFE</span></div>
      <div class="login-tagline">Crea tu cuenta de cliente</div>

      <div class="login-form-wrap">
        <h1 class="login-title">CREAR CUENTA</h1>
        <p class="login-subtitle">Regístrate para hacer pedidos</p>

        <form method="POST" action="{{ url_for('auth.registro') }}">
          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <input type="text" name="nombre" class="form-input" placeholder="Tu nombre" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="email" class="form-input" placeholder="tu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Contraseña</label>
            <input type="password" name="confirmar" class="form-input" placeholder="Repite tu contraseña" required>
          </div>
          <button type="submit" class="btn-login-submit">CREAR CUENTA →</button>
        </form>

        <p class="login-alt">¿Ya tienes cuenta?
          <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
